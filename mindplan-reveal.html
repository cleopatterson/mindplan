<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MindPlan — Dorothy Smith</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: linear-gradient(145deg, #0a0a1a 0%, #111127 50%, #0d1b2a 100%);
    font-family: 'DM Sans', sans-serif;
    color: #e2e8f0;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    touch-action: none;
  }

  /* ── Overlay ── */
  #overlay {
    position: fixed; inset: 0; z-index: 50;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(10,10,26,0.92);
    backdrop-filter: blur(10px);
    transition: opacity 0.6s ease, visibility 0.6s ease;
  }
  #overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
  #overlay .brand { font-size: 11px; font-weight: 600; letter-spacing: 3px; color: #e94560; text-transform: uppercase; margin-bottom: 12px; }
  #overlay .client-name { font-size: 26px; font-weight: 700; color: #e2e8f0; margin-bottom: 4px; }
  #overlay .sub { font-size: 13px; color: #64748b; margin-bottom: 36px; }
  #overlay button {
    background: transparent; border: 2px solid #e94560; color: #e94560;
    padding: 14px 44px; border-radius: 50px; font-size: 14px; font-weight: 600;
    letter-spacing: 1px; cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: all 0.3s ease;
  }
  #overlay button:hover, #overlay button:active {
    background: #e94560; color: #fff; box-shadow: 0 0 30px rgba(233,69,96,0.4);
  }

  /* ── Header ── */
  #header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 30;
    padding: 16px 20px;
    background: linear-gradient(180deg, rgba(10,10,26,0.95) 0%, transparent 100%);
    display: flex; justify-content: space-between; align-items: center;
  }
  #header .brand { font-size: 10px; font-weight: 600; letter-spacing: 2px; color: #e94560; text-transform: uppercase; }
  #header .title { font-size: 15px; font-weight: 700; color: #e2e8f0; }
  #total-value { text-align: right; opacity: 0; transition: opacity 1s ease-out; }
  #total-value.show { opacity: 1; }
  #total-value .label { font-size: 9px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }
  #total-value .amount { font-size: 18px; font-weight: 700; color: #00c897; font-family: 'JetBrains Mono', monospace; }

  /* ── Canvas ── */
  #map {
    position: fixed; inset: 0;
    overflow: hidden;
  }

  #map-inner {
    position: absolute;
    transform-origin: 0 0;
    will-change: transform;
  }

  /* ── Edges (SVG) ── */
  #edges {
    position: absolute; top: 0; left: 0;
    pointer-events: none;
    overflow: visible;
  }
  #edges line {
    stroke: #334155; stroke-width: 1.5;
    opacity: 0; transition: opacity 0.8s ease-out;
  }
  #edges line.show { opacity: 0.4; }

  /* ── Nodes ── */
  .node {
    position: absolute;
    text-align: center;
    border-radius: 14px;
    opacity: 0;
    transform: scale(0.3);
    transition: opacity 0.6s cubic-bezier(0.34,1.56,0.64,1),
                transform 0.6s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events: auto;
    white-space: nowrap;
  }
  .node.show { opacity: 1; transform: scale(1); }
  .node.client { border-radius: 50px; }

  .node .lbl { font-weight: 600; line-height: 1.35; }
  .node .sub { font-size: 10px; opacity: 0.55; margin-top: 2px; }
  .node .amt { font-weight: 700; font-family: 'JetBrains Mono', monospace; margin-top: 3px; }

  .node .warning-dot {
    position: absolute; top: -7px; right: -7px;
    background: #ef4444; border-radius: 50%; width: 18px; height: 18px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: bold; color: #fff;
    box-shadow: 0 0 8px rgba(239,68,68,0.6);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%,100% { transform: scale(1); box-shadow: 0 0 8px rgba(239,68,68,0.6); }
    50%     { transform: scale(1.2); box-shadow: 0 0 16px rgba(239,68,68,0.8); }
  }

  /* ── Legend ── */
  #legend {
    position: fixed; bottom: 14px; left: 14px; z-index: 30;
    display: flex; gap: 12px; flex-wrap: wrap;
    opacity: 0; transition: opacity 1s ease-out;
  }
  #legend.show { opacity: 0.7; }
  #legend .item { display: flex; align-items: center; gap: 5px; }
  #legend .dot { width: 9px; height: 9px; border-radius: 3px; }
  #legend .item span { font-size: 9px; color: #64748b; letter-spacing: 0.5px; }

  /* ── Zoom controls ── */
  #controls {
    position: fixed; bottom: 14px; right: 14px; z-index: 30;
    display: flex; gap: 8px;
  }
  #controls button {
    width: 36px; height: 36px; border-radius: 10px;
    background: rgba(30,41,59,0.7); border: 1px solid #334155;
    color: #94a3b8; font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(6px); transition: all 0.2s;
  }
  #controls button:hover { background: rgba(51,65,85,0.8); color: #e2e8f0; }
</style>
</head>
<body>

<!-- Overlay -->
<div id="overlay">
  <div class="brand">MindPlan</div>
  <div class="client-name">Dorothy Smith</div>
  <div class="sub">Client Fact Find · 20 February 2026</div>
  <button onclick="startReveal()">Generate Map</button>
</div>

<!-- Header -->
<div id="header">
  <div><div class="brand">MindPlan</div><div class="title">Client Structure Map</div></div>
  <div id="total-value"><div class="label">Total Net Position</div><div class="amount">$36,545,442</div></div>
</div>

<!-- Map area -->
<div id="map">
  <div id="map-inner">
    <svg id="edges"></svg>
  </div>
</div>

<!-- Legend -->
<div id="legend">
  <div class="item"><div class="dot" style="background:#0f3460;box-shadow:0 0 6px #0f346050"></div><span>Entity</span></div>
  <div class="item"><div class="dot" style="background:#00c897;box-shadow:0 0 6px #00c89750"></div><span>Property</span></div>
  <div class="item"><div class="dot" style="background:#00b4d8;box-shadow:0 0 6px #00b4d850"></div><span>Asset</span></div>
  <div class="item"><div class="dot" style="background:#7b2ff7;box-shadow:0 0 6px #7b2ff750"></div><span>Super</span></div>
  <div class="item"><div class="dot" style="background:#ffd166;box-shadow:0 0 6px #ffd16650"></div><span>Estate</span></div>
  <div class="item"><div class="dot" style="background:#ef4444;box-shadow:0 0 6px #ef444450"></div><span>Warning</span></div>
</div>

<!-- Zoom controls -->
<div id="controls">
  <button onclick="zoomMap(1.2)">+</button>
  <button onclick="zoomMap(0.8)">−</button>
  <button onclick="resetView()">⟲</button>
</div>

<script>
// ── Colour palette ──
const C = {
  client:   { bg:"#1a1a2e", border:"#e94560", text:"#fff",    glow:"rgba(233,69,96,0.4)" },
  entity:   { bg:"#16213e", border:"#0f3460", text:"#e2e8f0", glow:"rgba(15,52,96,0.3)" },
  asset:    { bg:"#1a1a2e", border:"#00b4d8", text:"#e2e8f0", glow:"rgba(0,180,216,0.25)" },
  super:    { bg:"#1a1a2e", border:"#7b2ff7", text:"#e2e8f0", glow:"rgba(123,47,247,0.3)" },
  property: { bg:"#1a1a2e", border:"#00c897", text:"#e2e8f0", glow:"rgba(0,200,151,0.25)" },
  liability:{ bg:"#1a1a2e", border:"#ff6b35", text:"#e2e8f0", glow:"rgba(255,107,53,0.3)" },
  estate:   { bg:"#1a1a2e", border:"#ffd166", text:"#e2e8f0", glow:"rgba(255,209,102,0.3)" },
  warning:  { bg:"#2d1b1b", border:"#ef4444", text:"#fca5a5", glow:"rgba(239,68,68,0.4)" },
  info:     { bg:"#1a1a2e", border:"#64748b", text:"#94a3b8", glow:"rgba(100,116,139,0.2)" },
};

// ── Data ──
const nodes = [];
const edges = [];
let delay = 0;
const STEP = 110;

function n(id, label, x, y, cat, opts={}) {
  nodes.push({ id, label, x, y, cat, delay, ...opts });
  delay += STEP;
}
function e(src, tgt) { edges.push({ src, tgt }); }

// Client
n("dorothy","Dorothy Smith",0,0,"client",{ sub:"Age 74 · Crawley WA", sz:"lg" });

// Entities
n("entities","Entities",-280,-180,"entity",{ sz:"md" });
e("dorothy","entities");

n("dj","DJ Smith Foundation",-560,-340,"entity",{ sub:"Discretionary Trust", amt:"$1.68M" });
e("entities","dj");
n("dj1","34 Victoria Cct",-820,-400,"property",{ amt:"$820K", sz:"sm" });
n("dj2","62 Forrest Ave",-820,-340,"property",{ amt:"$800K", sz:"sm" });
n("dj3","Cash",-820,-280,"asset",{ amt:"$57.5K", sz:"sm" });
e("dj","dj1"); e("dj","dj2"); e("dj","dj3");

n("jpf","JPF Family Trust",-560,-170,"entity",{ sub:"Discretionary", amt:"$2.5M" });
e("entities","jpf");
n("jpf1","Francis St",-820,-170,"property",{ amt:"$2.5M", sz:"sm" });
e("jpf","jpf1");

n("smsf","SF Super (SMSF)",-560,-10,"super",{ sub:"Self-Managed", amt:"$8.8M" });
e("entities","smsf");
n("sf1","Direct Shares",-820,-70,"asset",{ amt:"$6.66M", sz:"sm" });
n("sf2","Reid Prom 40%",-820,-10,"property",{ amt:"$1.55M", sz:"sm" });
n("sf3","Cash & Savings",-820,50,"asset",{ amt:"$511K", sz:"sm" });
e("smsf","sf1"); e("smsf","sf2"); e("smsf","sf3");

n("sft","SF Family Trust",-560,140,"entity",{ sub:"Discretionary", amt:"$5.2M" });
e("entities","sft");
n("sft1","Hutton St",-820,110,"property",{ amt:"$4.5M", sz:"sm" });
n("sft2","Aberdeen St 1%",-820,170,"property",{ amt:"$700K", sz:"sm" });
e("sft","sft1"); e("sft","sft2");

n("hnom","Hribar Nominees",-560,260,"entity",{ sub:"Corporate Trustee", sz:"sm" });
n("hinv","Hribar Investments",-560,320,"entity",{ sub:"SMSF Trustee", sz:"sm" });
e("entities","hnom"); e("entities","hinv");

// Personal assets
n("personal","Personal Assets",280,-200,"asset",{ sz:"md" });
e("dorothy","personal");
n("home","Mounts Bay Rd",540,-290,"property",{ sub:"Residence", amt:"$4.34M" });
n("reid","Reid Prom 60%",540,-200,"property",{ sub:"Commercial", amt:"$2.24M" });
n("king","King Edward Rd",540,-110,"property",{ sub:"Commercial", amt:"$7M" });
e("personal","home"); e("personal","reid"); e("personal","king");

// Super & Pension
n("sp","Super & Pension",280,0,"super",{ sz:"md" });
e("dorothy","sp");
n("acc","Accumulation",540,-40,"super",{ amt:"$4.37M", sz:"sm" });
n("abp1","ABP Mixed",540,20,"super",{ amt:"$2.15M", sz:"sm" });
n("abp2","ABP Tax Free",540,80,"super",{ amt:"$611K", sz:"sm" });
e("sp","acc"); e("sp","abp1"); e("sp","abp2");

// Estate
n("estate","Estate Planning",280,180,"estate",{ sz:"md" });
e("dorothy","estate");
n("will","Will ✓",540,140,"estate",{ sub:"Sonia, Karl, Melanie", sz:"sm" });
n("epa","EPA ✓",540,195,"estate",{ sz:"sm" });
n("epg","EPG ✓",540,245,"estate",{ sz:"sm" });
n("noms","Super Nominations",540,300,"estate",{ sub:"Non-lapsing binding", sz:"sm" });
e("estate","will"); e("estate","epa"); e("estate","epg"); e("estate","noms");

// Family
n("family","Family",0,260,"info",{ sz:"md" });
e("dorothy","family");
n("karl","Karl Hribar",-180,370,"info",{ sub:"Therapist · $51K", sz:"sm" });
n("sonia","Sonia White",0,390,"info",{ sub:"Dietitian · $21K", sz:"sm" });
n("daniel","Daniel Hribar",180,370,"info",{ sub:"Valuer · $129K", sz:"sm" });
e("family","karl"); e("family","sonia"); e("family","daniel");

// Advisers
n("advisers","Advisers",0,-260,"info",{ sz:"md" });
e("dorothy","advisers");
n("katie","Katie McDonald",-200,-360,"info",{ sub:"Financial Adviser", sz:"sm" });
n("mel","Melanie McRoberts",0,-380,"info",{ sub:"Accountant", sz:"sm" });
n("mich","Michael Hughes",200,-360,"info",{ sub:"Estate Planner", sz:"sm" });
e("advisers","katie"); e("advisers","mel"); e("advisers","mich");

// Warning
n("warn","⚠ No appointor",-560,400,"warning",{ sub:"DJ Smith Foundation", sz:"sm", warning:true });
e("dj","warn");

// ── Render ──
const inner = document.getElementById("map-inner");
const svg = document.getElementById("edges");
const nodeEls = {};

// Size map
const PAD = 100;
let minX=Infinity, maxX=-Infinity, minY=Infinity, maxY=-Infinity;
nodes.forEach(n => {
  const hw = n.sz==="lg"?110 : n.sz==="md"?85 : 70;
  const hh = 25;
  if(n.x-hw<minX) minX=n.x-hw;
  if(n.x+hw>maxX) maxX=n.x+hw;
  if(n.y-hh<minY) minY=n.y-hh;
  if(n.y+hh>maxY) maxY=n.y+hh;
});
const mapW = maxX-minX+PAD*2;
const mapH = maxY-minY+PAD*2;
const offX = -minX+PAD;
const offY = -minY+PAD;

inner.style.width = mapW+"px";
inner.style.height = mapH+"px";
svg.setAttribute("width", mapW);
svg.setAttribute("height", mapH);
svg.style.width = mapW+"px";
svg.style.height = mapH+"px";

// Draw edges
edges.forEach(ed => {
  const s = nodes.find(n=>n.id===ed.src);
  const t = nodes.find(n=>n.id===ed.tgt);
  const line = document.createElementNS("http://www.w3.org/2000/svg","line");
  line.setAttribute("x1", s.x+offX);
  line.setAttribute("y1", s.y+offY);
  line.setAttribute("x2", t.x+offX);
  line.setAttribute("y2", t.y+offY);
  line.dataset.src = ed.src;
  line.dataset.tgt = ed.tgt;
  svg.appendChild(line);
});

// Draw nodes
nodes.forEach(nd => {
  const c = nd.warning ? C.warning : (C[nd.cat]||C.info);
  const el = document.createElement("div");
  el.className = "node" + (nd.cat==="client" ? " client" : "");
  const fs = nd.sz==="lg"?15 : nd.sz==="md"?12 : 10;
  const px = nd.sz==="lg"?"16px 28px" : nd.sz==="md"?"10px 20px" : "7px 14px";
  el.style.cssText = `
    left:${nd.x+offX}px; top:${nd.y+offY}px;
    transform: translate(-50%,-50%) scale(0.3);
    background:${c.bg}; border:2px solid ${c.border}; color:${c.text};
    padding:${px}; font-size:${fs}px;
    box-shadow: 0 0 20px ${c.glow}, 0 4px 12px rgba(0,0,0,0.3);
  `;
  let html = "";
  if(nd.warning) html += '<div class="warning-dot">!</div>';
  html += `<div class="lbl">${nd.label}</div>`;
  if(nd.sub) html += `<div class="sub">${nd.sub}</div>`;
  if(nd.amt) html += `<div class="amt" style="color:${c.border};font-size:${nd.sz==="sm"?11:13}px">${nd.amt}</div>`;
  el.innerHTML = html;
  inner.appendChild(el);
  nodeEls[nd.id] = el;
});

// ── Pan & Zoom ──
let scale = 1, tx = 0, ty = 0;
let dragging = false, lastX, lastY;

function applyTransform() {
  inner.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
}

function resetView() {
  const vw = window.innerWidth, vh = window.innerHeight;
  const sx = vw/mapW, sy = vh/mapH;
  scale = Math.min(sx, sy) * 0.85;
  tx = (vw - mapW*scale)/2;
  ty = (vh - mapH*scale)/2;
  applyTransform();
}

function zoomMap(factor) {
  const cx = window.innerWidth/2, cy = window.innerHeight/2;
  const ns = Math.max(0.15, Math.min(3, scale*factor));
  tx = cx - (cx-tx)*(ns/scale);
  ty = cy - (cy-ty)*(ns/scale);
  scale = ns;
  applyTransform();
}

// Mouse
document.getElementById("map").addEventListener("mousedown", ev => { dragging=true; lastX=ev.clientX; lastY=ev.clientY; });
window.addEventListener("mousemove", ev => { if(!dragging) return; tx+=ev.clientX-lastX; ty+=ev.clientY-lastY; lastX=ev.clientX; lastY=ev.clientY; applyTransform(); });
window.addEventListener("mouseup", () => dragging=false);
document.getElementById("map").addEventListener("wheel", ev => { ev.preventDefault(); zoomMap(ev.deltaY<0?1.1:0.9); }, {passive:false});

// Touch
let lastTouches = null;
document.getElementById("map").addEventListener("touchstart", ev => {
  if(ev.touches.length===1){ dragging=true; lastX=ev.touches[0].clientX; lastY=ev.touches[0].clientY; }
  if(ev.touches.length===2){ dragging=false; lastTouches=[...ev.touches]; }
});
window.addEventListener("touchmove", ev => {
  ev.preventDefault();
  if(dragging && ev.touches.length===1){
    tx+=ev.touches[0].clientX-lastX; ty+=ev.touches[0].clientY-lastY;
    lastX=ev.touches[0].clientX; lastY=ev.touches[0].clientY; applyTransform();
  }
  if(ev.touches.length===2 && lastTouches){
    const d1 = Math.hypot(lastTouches[0].clientX-lastTouches[1].clientX, lastTouches[0].clientY-lastTouches[1].clientY);
    const d2 = Math.hypot(ev.touches[0].clientX-ev.touches[1].clientX, ev.touches[0].clientY-ev.touches[1].clientY);
    zoomMap(d2/d1);
    lastTouches=[...ev.touches];
  }
}, {passive:false});
window.addEventListener("touchend", () => { dragging=false; lastTouches=null; });

resetView();

// ── Animation ──
function startReveal() {
  document.getElementById("overlay").classList.add("hidden");

  nodes.forEach(nd => {
    setTimeout(() => {
      const el = nodeEls[nd.id];
      el.classList.add("show");
      el.style.transform = "translate(-50%,-50%) scale(1)";
    }, nd.delay);
  });

  // Edges appear after both nodes visible
  document.querySelectorAll("#edges line").forEach(line => {
    const s = nodes.find(n=>n.id===line.dataset.src);
    const t = nodes.find(n=>n.id===line.dataset.tgt);
    const d = Math.max(s.delay, t.delay) + 250;
    setTimeout(() => line.classList.add("show"), d);
  });

  // Total value
  const maxDelay = Math.max(...nodes.map(n=>n.delay));
  setTimeout(() => document.getElementById("total-value").classList.add("show"), maxDelay + 600);
  setTimeout(() => document.getElementById("legend").classList.add("show"), maxDelay + 800);
}
</script>
</body>
</html>
